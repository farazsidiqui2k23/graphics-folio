<div class="w-full bg-secondary-black px-4 md:px-12 py-16">
  <h1
    class="text-5xl my-4 bg-gradient-to-r from-dark-creame to-light-creame bg-clip-text text-transparent md:text-6xl"
  >
    Services
  </h1>

  <div class="grid md:grid-cols-2 gap-4 my-8">
    <!-- cards -->
    <div class="bg-card-black p-4 py-6 rounded-2xl group" *ngFor="let service of services">
      <div class="flex justify-between my-4">
        <div
          class="text-dark-creame border-1 px-2 rounded-lg 
          group-hover:bg-gradient-to-r group-hover:from-dark-creame group-hover:to-light-creame group-hover:text-primary-black transition-all duration-300"
        >
          {{ service.count }}
        </div>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          strokeWidth="{1.8}"
          stroke="currentColor"
          className="size-6"
          class="w-6 text-dark-creame group-hover:rotate-45 group-hover:text-light-creame transition-all duration-300"
        >
          <path
            strokeLinecap="round"
            strokeLinejoin="round"
            d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25"
          />
        </svg>

      </div>
      <h1 class="text-4xl my-4 text-light-creame md:text-5xl">
        {{ service.title }}
      </h1>
      <p class="text-dark-creame text-lg">
        {{ service.desc }}
      </p>
    </div>
  </div>
</div>
