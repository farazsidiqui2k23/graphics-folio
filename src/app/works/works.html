<div class="w-full bg-primary-black px-4 md:px-12 py-16">
  <div class="md:flex justify-between items-center">
    <h1
      class="text-5xl bg-gradient-to-r from-dark-creame to-light-creame bg-clip-text text-transparent md:text-6xl"
    >
      Works
    </h1>

    <div class="">
      <button
        class=" px-6 md:px-8 py-2 rounded-full font-bold"
        *ngFor="let wc of worksCategory"
        (click)="selectCategory(wc)"
        [ngClass]="{
          'bg-light-creame': defaultCategory === wc,
          'border-[0.5px] text-light-creame border-dark-creame mx-2': defaultCategory !== wc
        }"
      >
        {{ wc }}
      </button>
     
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4 my-8">
    <!-- cards -->
    <div class="bg-card-black p-4 py-6 rounded-2xl group" 
    *ngFor="let work of works">
      <div class="rounded-2xl overflow-hidden">
        <img
          class="w-full group-hover:scale-110 transition-all duration-300"
          src="https://cdn.dribbble.com/userupload/42886043/file/original-2cd65521bb379cf3a5d8ce58c442d7eb.jpg?resize=752x&vertical=center"
          alt=""
        />
      </div>
      <div class="flex justify-between my-4">
        <h1 class="text-4xl my-4 text-light-creame md:text-5xl">
          {{ work.title }}
        </h1>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          strokeWidth="{1.8}"
          stroke="currentColor"
          className="size-6"
          class="w-6 text-dark-creame group-hover:rotate-45 group-hover:text-light-creame transition-all duration-300"
        >
          <path
            strokeLinecap="round"
            strokeLinejoin="round"
            d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25"
          />
        </svg>
      </div>

      <p class="text-dark-creame text-lg">
        {{ work.desc }}
      </p>
    </div>
  </div>
</div>
