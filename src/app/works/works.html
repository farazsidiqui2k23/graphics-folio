<div class="w-full bg-primary-black px-4 md:px-12 py-16">
  
    <div class="md:flex justify-between items-center ">
<h1
    class="text-5xl bg-gradient-to-r from-dark-creame to-light-creame bg-clip-text text-transparent md:text-6xl"
  >
    Works
  </h1>

  <div class="">
    <button class="bg-light-creame px-6 md:px-8 py-2 rounded-full font-bold">All</button>
    <button class="text-light-creame px-6 md:px-8 py-2 rounded-full font-bold border-[0.5px] border-dark-creame mx-2">Branding</button>
    <button class="text-light-creame px-6 md:px-8 py-2 rounded-full font-bold border-[0.5px] border-dark-creame mx-2">Product</button>
    <button class="text-light-creame px-6 md:px-8 py-2 rounded-full font-bold border-[0.5px] border-dark-creame mx-2">UX/UI</button>
  </div>
    </div>
    
  <div class="grid md:grid-cols-2 gap-4 my-8">
    <!-- cards -->
    <div class="bg-card-black p-4 py-6 rounded-2xl" *ngFor="let work of works">
      <div class="rounded-2xl overflow-hidden">
        <img 
        class="w-full"
        src="https://i.pinimg.com/236x/e0/1c/6b/e01c6b0dc0a1d1755e847ecb5dad4f60.jpg" alt="">
      </div>
        <div class="flex justify-between my-4">
        <div class="text-dark-creame border-1 px-2 rounded-lg">{{ work.count }}</div>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          strokeWidth="{1.8}"
          stroke="currentColor"
          className="size-6"
          class="w-6 text-dark-creame"
        >
          <path
            strokeLinecap="round"
            strokeLinejoin="round"
            d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25"
          />
        </svg>
      </div>
      <h1 class="text-4xl my-4 text-light-creame md:text-5xl">
        {{ work.title }}
      </h1>
      <p class="text-dark-creame text-lg">
        {{ work.desc }}
      </p>
    </div>
  </div>
</div>
