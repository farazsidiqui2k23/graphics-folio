<form action="" class="w-full bg-card-black p-8 rounded-xl flex flex-col gap-6">
  <input
    type="text"
    placeholder="Ahmed"
    class="bg-secondary-black p-4 text-dark-creame rounded-md w-full"
  />

  <input
    type="email"
    placeholder="ahmed@example.com"
    class="bg-secondary-black p-4 text-dark-creame rounded-md w-full"
  />

  <input
    type="text"
    placeholder="Subject"
    class="bg-secondary-black p-4 text-dark-creame rounded-md w-full"
  />

    type="text"
    placeholder="Message"
